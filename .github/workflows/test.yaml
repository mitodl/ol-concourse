---
name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    name: pytest (${{ matrix.package.name }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        package:
          - name: ol-concourse
            test_path: pipeline_lib/tests/
          - name: ol-concourse-github-issues
            test_path: resources/github-issues/tests/
          - name: ol-concourse-npm
            test_path: resources/npm/tests/
          - name: ol-concourse-packer
            test_path: resources/packer/tests/
          - name: ol-concourse-pulumi
            test_path: resources/pulumi/tests/
          - name: ol-concourse-pypi
            test_path: resources/pypi/tests/

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Run tests
        run: >-
          uv run --package ${{ matrix.package.name }}
          pytest ${{ matrix.package.test_path }} -v
