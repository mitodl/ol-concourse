            args:
              - -exc
              - |
                cp -a ol-concourse-pypi-src/. build-context/
                cd build-context
                uv export --package ol-concourse-pypi --no-dev --no-emit-workspace \
                  --no-hashes -o resources/pypi/requirements.txt
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image
          run:
            path: build
          params:
            CONTEXT: build-context/resources/pypi
            DOCKERFILE: build-context/resources/pypi/Dockerfile
      - put: concourse-pypi-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-pypi-src/.git/ref

  - name: build-and-publish-npm-image
    public: true
    plan:
      - get: ol-concourse-npm-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
