      - put: concourse-pulumi-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-pulumi-src/.git/ref
      - task: build-image-provisioner
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
