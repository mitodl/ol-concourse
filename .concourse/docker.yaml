---
resources:
  - name: ol-concourse-packer-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/packer
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-pulumi-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/pulumi
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-github-issues-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/github-issues
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-pypi-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/pypi
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-npm-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/npm
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-github-deployments-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/github-deployments
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-release-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/release
        - uv.lock
        - pyproject.toml

  - name: concourse-packer-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-packer-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pulumi-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pulumi-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pulumi-resource-provisioner
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pulumi-resource-provisioner
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-github-issues-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-github-issues-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pypi-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pypi-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-npm-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-npm-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: ol-concourse-task-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - pipeline_lib
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-task-image
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/ol-concourse-dsl
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-github-deployments-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-github-deployments-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-release-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-release-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

jobs:
  - name: build-and-publish-packer-image
    public: true
    plan:
      - get: ol-concourse-packer-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm
          inputs:
            - name: ol-concourse-packer-src
          outputs:
            - name: build-context
          run:
            path: /bin/sh
            args:
              - -exc
              - |
                cp -a ol-concourse-packer-src/. build-context/
                cd build-context
                uv build --package ol-concourse-packer --out-dir resources/packer/dist/
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image
          run:
            path: build
          params:
            CONTEXT: build-context/resources/packer
            DOCKERFILE: build-context/resources/packer/Dockerfile
      - put: concourse-packer-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-packer-src/.git/ref

  - name: build-and-publish-pulumi-image
