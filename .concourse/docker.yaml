---
resources:
  - name: ol-concourse-packer-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/packer
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-pulumi-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/pulumi
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-github-issues-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/github-issues
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-pypi-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/pypi
        - uv.lock
        - pyproject.toml

  - name: ol-concourse-npm-src
    type: git
    icon: github
    source:
      uri: https://github.com/mitodl/ol-concourse
      branch: main
      paths:
        - resources/npm
        - uv.lock
        - pyproject.toml

  - name: concourse-packer-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-packer-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pulumi-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pulumi-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pulumi-resource-provisioner
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pulumi-resource-provisioner
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-github-issues-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-github-issues-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-pypi-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-pypi-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

  - name: concourse-npm-resource
    type: registry-image
    icon: docker
    source:
      tag: latest
      repository: mitodl/concourse-npm-resource
      username: ((dockerhub.username))
      password: ((dockerhub.password))

jobs:
  - name: build-and-publish-packer-image
    public: true
    plan:
      - get: ol-concourse-packer-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm
          inputs:
            - name: ol-concourse-packer-src
          outputs:
            - name: build-context
          run:
            path: /bin/sh
            args:
              - -exc
              - |
                cp -a ol-concourse-packer-src/. build-context/
                cd build-context
                uv export --package ol-concourse-packer --no-dev --no-emit-workspace \
                  --no-hashes -o resources/packer/requirements.txt
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image
          run:
            path: build
          params:
            CONTEXT: build-context/resources/packer
            DOCKERFILE: build-context/resources/packer/Dockerfile
      - put: concourse-packer-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-packer-src/.git/ref

  - name: build-and-publish-pulumi-image
    public: true
    plan:
      - get: ol-concourse-pulumi-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm
          inputs:
            - name: ol-concourse-pulumi-src
          outputs:
            - name: build-context
          run:
            path: /bin/sh
            args:
              - -exc
              - |
                cp -a ol-concourse-pulumi-src/. build-context/
                cd build-context
                uv export --package ol-concourse-pulumi --no-dev --no-emit-workspace \
                  --no-hashes -o resources/pulumi/requirements.txt
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image
          run:
            path: build
          params:
            CONTEXT: build-context/resources/pulumi
            DOCKERFILE: build-context/resources/pulumi/Dockerfile
      - task: build-image-provisioner
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image-provisioner
          run:
            path: build
          params:
            CONTEXT: build-context/resources/pulumi
            DOCKERFILE: build-context/resources/pulumi/Dockerfile.mitol_provision
            OUTPUT_OCI: image-provisioner/image.tar
      - put: concourse-pulumi-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-pulumi-src/.git/ref
      - put: concourse-pulumi-resource-provisioner
        params:
          image: image-provisioner/image.tar
          additional_tags: ol-concourse-pulumi-src/.git/ref

  - name: build-and-publish-github-issues-image
    public: true
    plan:
      - get: ol-concourse-github-issues-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm
          inputs:
            - name: ol-concourse-github-issues-src
          outputs:
            - name: build-context
          run:
            path: /bin/sh
            args:
              - -exc
              - |
                cp -a ol-concourse-github-issues-src/. build-context/
                cd build-context
                uv export --package ol-concourse-github-issues --no-dev --no-emit-workspace \
                  --no-hashes -o resources/github-issues/requirements.txt
      - task: build-image
        privileged: true
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: concourse/oci-build-task
          inputs:
            - name: build-context
          outputs:
            - name: image
          run:
            path: build
          params:
            CONTEXT: build-context/resources/github-issues
            DOCKERFILE: build-context/resources/github-issues/Dockerfile
      - put: concourse-github-issues-resource
        params:
          image: image/image.tar
          additional_tags: ol-concourse-github-issues-src/.git/ref

  - name: build-and-publish-pypi-image
    public: true
    plan:
      - get: ol-concourse-pypi-src
        trigger: true
      - task: generate-requirements
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm
          inputs:
            - name: ol-concourse-pypi-src
          outputs:
            - name: build-context
          run:
