---
# Self-managing pipeline: keeps the docker image build and PyPI publishing
# pipelines in sync with their respective .concourse/*.yaml files whenever
# the ol-concourse repository changes.
resources:
- name: ol-concourse
  type: git
  icon: github
  source:
    uri: https://github.com/mitodl/ol-concourse
    branch: main

jobs:
- name: set-docker-pipeline
  public: true
  plan:
  - get: ol-concourse
    trigger: true
  - set_pipeline: docker
    file: ol-concourse/.concourse/docker.yaml

- name: set-pypi-pipeline
  public: true
  plan:
  - get: ol-concourse
    trigger: true
  - set_pipeline: pypi
    file: ol-concourse/.concourse/pypi.yaml
